server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html/browser;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (if running in same network or via Railway public URL)
    location /api/ {
        # This will be replaced at runtime or handled via environment.prod.ts
        # proxy_pass http://backend:8080/api/;
        try_files $uri $uri/ /index.html;
    }
}
